name: CI/CD Pipeline - Booking App
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: booking_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_test
        run: |
          cd backend
          npm run migrate

      - name: Run backend tests
        run: |
          cd backend
          npm test -- --passWithNoTests || true

      - name: Start backend server
        run: |
          cd backend
          npm start &
        timeout-minutes: 1

  # ─────────────────────────────────────────────
  # Job 2: Frontend Build & Lint
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint || true

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ─────────────────────────────────────────────
  # Job 3: Security Scanning
  # รันหลังจาก tests ผ่านแล้ว ก่อน deployment
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 1. Dependency Vulnerability Scan ──────
      - name: Backend — npm audit
        run: |
          cd backend
          npm ci
          echo "=== Backend Dependency Audit ==="
          npm audit --audit-level=high
        # หยุด pipeline ถ้าพบ high/critical vulnerability

      - name: Frontend — npm audit
        run: |
          cd frontend
          npm ci
          echo "=== Frontend Dependency Audit ==="
          npm audit --audit-level=high

      # ── 2. Secret Scanning ────────────────────
      # ตรวจหา hardcoded secrets ที่อาจหลุดใน code
      - name: Scan for hardcoded secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # ── 3. OWASP Dependency Check ─────────────
      # ตรวจสอบ dependencies กับ CVE database
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: 'booking-app'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --failOnCVSS 7
        continue-on-error: true
        # failOnCVSS 7 = หยุดถ้าพบ CVSS score ≥ 7.0 (High)

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()  # upload แม้ว่า job จะ fail
        with:
          name: owasp-dependency-report
          path: ${{ github.workspace }}/reports

  # ─────────────────────────────────────────────
  # Job 6: Post-Deployment Smoke Tests
  # รันหลัง deploy ทั้งหมดสำเร็จ ทดสอบบน Production จริง
  # ─────────────────────────────────────────────
  post-deploy-smoke-test:
    name: Post-Deploy Smoke Tests (Production)
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend-render]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      # ── Backend Smoke Tests (Production API) ──
      - name: Run API Smoke Tests on Production
        env:
          PROD_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$PROD_BACKEND_URL" ]; then
            echo "⚠️  RENDER_BACKEND_URL not configured - skipping production tests"
            exit 0
          fi
          newman run newman/hotel-booking-collection.json \
            --env-var "baseUrl=$PROD_BACKEND_URL" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export smoke-test-report.html \
            --bail || true

      # ── Frontend Availability Check ──────────
      - name: Check Frontend is Reachable
        run: |
          FRONTEND_URL="${{ secrets.VERCEL_FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then
            echo "⚠️  VERCEL_FRONTEND_URL not configured"
            exit 0
          fi
          echo "Checking frontend URL: $FRONTEND_URL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Frontend is up (HTTP $HTTP_STATUS)"
          else
            echo "⚠️  Frontend returned HTTP $HTTP_STATUS"
          fi

      # ── Upload Test Report ────────────────────
      - name: Upload Smoke Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report-${{ github.sha }}
          path: smoke-test-report.html
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 4: Deploy Frontend (Vercel)
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [frontend-build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          vercel --prod --yes --token $VERCEL_TOKEN
        continue-on-error: true
        # ในโปรเจกต์จริงต้อง configure Vercel properly

  # ─────────────────────────────────────────────
  # Job 5: Deploy Backend (Render)
  # ─────────────────────────────────────────────
  deploy-backend-render:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [backend-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl "$RENDER_DEPLOY_HOOK"
            echo "✅ Deployment triggered on Render"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK not set - skipping deployment"
          fi
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 7: API Tests with Newman
  # ทดสอบ API ด้วย Postman Collection
  # ─────────────────────────────────────────────
  api-tests:
    name: API Tests with Newman
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Start backend server
        run: |
          cd backend
          npm install
          npm start > /tmp/backend.log 2>&1 &
          # Wait for server to start
          for i in {1..30}; do
            if curl -f http://localhost:3001/api/rooms 2>/dev/null; then
              echo "✅ Backend server is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done

      - name: Run Postman Collection Tests
        run: |
          newman run newman/hotel-booking-collection.json \
            --environment newman/hotel-booking-env.json \
            --env-var "baseUrl=http://localhost:3001" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export newman-report.html \
            --bail || true

      - name: Upload Newman Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-test-report-${{ github.sha }}
          path: newman-report.html